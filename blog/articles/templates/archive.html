<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Архив статей</title>
</head>
<body>
    <div class="header">
        <img src="/static/img/logo.png" alt="Logo" style="width: 100px;">
    </div>

    <div class="archive">
        {% for post in posts %}
            <div class="one-post">
                <h2 class="post-title">{{ post.title }}</h2>
                <div class="article-info">
                    <div class="article-author">Автор: {{ post.author.username }}</div>
                    <div class="article-created-date">Дата: {{ post.created_date }}</div>
                </div>
                <p class="article-text">{{ post.get_excerpt }}</p>
            </div>
            <hr> {% endfor %}
    </div>
</body>
</html>
